spring:
  application:
    name: gateway
  datasource:
    url: jdbc:mysql://localhost:3306/gateway
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    database: mysql
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8055
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://localhost:8056
          predicates:
            - Path=/product/**
          filters:
            - Authentication

server:
  port: 9999