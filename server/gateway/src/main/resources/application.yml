spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: spring-service
          uri: http://localhost:8055
          predicates:
            - Path=/spring/**
          filters:
            - StripPrefix=1
        - id: nest-service
          uri: http://localhost:4100
          predicates:
            - Path=/nest/**
          filters:
            - StripPrefix=1

server:
  port: 9999